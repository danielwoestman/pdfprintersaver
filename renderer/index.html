<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Printer Saver</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --app-bg: #F4F4F5;
      --toolbar-bg: #FFFFFF;
      --toolbar-border: #D1D5DB;  /* slightly darker border — easier to see */
      --text: #111827;
      --text-muted: #374151;      /* darkened from #6B7280 — WCAG AA on white */
      --text-faint: #4B5563;      /* darkened from #9CA3AF — readable status bar */

      /* Nav buttons */
      --nav-btn-bg: #F4F4F5;
      --nav-btn-hover: #E4E4E7;
      --nav-btn-active: #D4D4D8;
      --nav-btn-border: #D1D5DB;

      /* Open PDF primary */
      --primary: #1D4ED8;         /* slightly deeper blue — higher contrast */
      --primary-hover: #1E40AF;

      /* Tab action buttons */
      --tab-bg: #FFFFFF;
      --tab-border: #D1D5DB;
      --tab-hover: #F4F4F5;
      --tab-active-bg: #EFF6FF;
      --tab-active-border: #93C5FD;
      --tab-active-text: #1D4ED8;
      --tab-unconfigured-bg: #FAFAFA;
      --tab-unconfigured-text: #6B7280;

      /* Print & Settings */
      --print-bg: #6D28D9;        /* slightly deeper purple */
      --print-hover: #5B21B6;

      /* Canvas */
      --pdf-bg: #D1D5DB;          /* slightly darker surround = more contrast with white page */
      --canvas-shadow: 0 4px 24px rgba(0,0,0,0.18), 0 1px 6px rgba(0,0,0,0.10);

      /* Status */
      --status-bg: #F9FAFB;
      --status-border: #D1D5DB;

      /* Toast */
      --toast-success: #047857;
      --toast-error: #B91C1C;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;            /* up from 13px */
      background: var(--app-bg);
      color: var(--text);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Nav toolbar ── */
    #nav-toolbar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 8px 12px;          /* up from 6px 10px */
      background: var(--toolbar-bg);
      border-bottom: 1px solid var(--toolbar-border);
      flex-shrink: 0;
      min-height: 56px;           /* up from implicit ~44px */
      -webkit-app-region: drag;
    }

    #nav-toolbar > * { -webkit-app-region: no-drag; }

    /* ── Action toolbar ── */
    #action-toolbar {
      display: flex;
      align-items: center;
      padding: 0 12px;
      background: var(--toolbar-bg);
      border-bottom: 1px solid var(--toolbar-border);
      flex-shrink: 0;
      height: 52px;               /* up from 40px */
      gap: 8px;
    }

    /* Scrollable tab strip */
    #action-buttons-wrap {
      flex: 1;
      min-width: 0;
      position: relative;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    #action-buttons {
      display: flex;
      gap: 4px;                   /* up from 2px */
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      scroll-behavior: smooth;
      padding: 6px 0;
    }
    #action-buttons::-webkit-scrollbar { display: none; }

    /* Fade-out gradient on right edge when overflowing */
    #action-buttons-wrap::after {
      content: '';
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 40px;
      background: linear-gradient(to right, transparent, var(--toolbar-bg));
      pointer-events: none;
    }

    #fixed-buttons {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    /* ── Nav toolbar buttons — 44px minimum touch target ── */
    .toolbar-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      min-height: 40px;           /* WCAG minimum */
      padding: 8px 13px;          /* up from 4px 9px */
      background: var(--nav-btn-bg);
      color: var(--text);
      border: 1px solid var(--nav-btn-border);
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;            /* up from 12px */
      font-family: inherit;
      white-space: nowrap;
      transition: background 0.1s, border-color 0.1s;
      line-height: 1;
    }
    .toolbar-btn:hover:not(:disabled) {
      background: var(--nav-btn-hover);
      border-color: #9CA3AF;
    }
    .toolbar-btn:active:not(:disabled) { background: var(--nav-btn-active); }
    .toolbar-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .toolbar-btn.primary {
      background: var(--primary);
      color: #fff;
      border-color: transparent;
      font-weight: 600;           /* bolder */
      padding: 8px 18px;
    }
    .toolbar-btn.primary:hover:not(:disabled) {
      background: var(--primary-hover);
    }

    /* ── Tab action buttons ── */
    .action-btn {
      display: inline-flex;
      align-items: center;
      min-height: 38px;           /* tall enough to hit easily */
      padding: 8px 16px;          /* up from 4px 11px */
      background: var(--tab-bg);
      color: var(--text);
      border: 1px solid var(--tab-border);
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;            /* up from 12px */
      font-weight: 600;           /* bolder — easier to read label */
      font-family: inherit;
      white-space: nowrap;
      transition: background 0.1s, border-color 0.1s, color 0.1s;
      line-height: 1.3;
      flex-shrink: 0;
    }
    .action-btn:hover:not(:disabled) {
      background: var(--tab-hover);
      border-color: #9CA3AF;
    }
    .action-btn:active:not(:disabled) {
      background: var(--tab-active-bg);
      border-color: var(--tab-active-border);
      color: var(--tab-active-text);
    }
    .action-btn:disabled { cursor: not-allowed; }

    .action-btn.unconfigured {
      background: var(--tab-unconfigured-bg);
      color: var(--tab-unconfigured-text);
      font-weight: 400;
      font-style: italic;
      border-style: dashed;
    }

    .action-btn.print-btn {
      background: var(--print-bg);
      color: #fff;
      border-color: transparent;
      font-style: normal;
    }
    .action-btn.print-btn:hover:not(:disabled) {
      background: var(--print-hover);
    }
    .action-btn.print-btn:disabled {
      background: #A78BFA;
      color: #fff;
    }

    .action-btn.settings-btn {
      background: var(--nav-btn-bg);
      color: var(--text-muted);
      border-color: var(--nav-btn-border);
      font-style: normal;
      font-weight: 400;
    }
    .action-btn.settings-btn:hover {
      background: var(--nav-btn-hover);
      color: var(--text);
    }

    /* ── Separator ── */
    .sep {
      width: 1px;
      height: 22px;               /* up from 16px */
      background: var(--toolbar-border);
      margin: 0 6px;
      flex-shrink: 0;
    }

    /* ── Page info / zoom label ── */
    #page-info {
      min-width: 76px;
      text-align: center;
      font-size: 14px;            /* up from 12px */
      font-weight: 500;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    #zoom-level {
      min-width: 48px;
      text-align: center;
      font-size: 14px;            /* up from 12px */
      font-weight: 500;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    /* ── PDF area ── */
    #pdf-container {
      flex: 1;
      overflow: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--pdf-bg);
      padding: 40px;              /* up from 28px */
    }

    #pdf-empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: #6B7280;
      user-select: none;
      pointer-events: none;
    }

    #pdf-empty-state .icon {
      font-size: 72px;            /* up from 52px */
      opacity: 0.5;
      filter: grayscale(1);
    }

    #pdf-empty-state h2 {
      font-size: 22px;            /* up from 16px */
      font-weight: 600;
      color: #374151;
    }

    #pdf-empty-state p {
      font-size: 15px;            /* up from 12px */
      color: #6B7280;
    }

    #pdf-canvas {
      display: none;
      box-shadow: var(--canvas-shadow);
      background: white;
    }

    /* ── Status bar ── */
    #status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      height: 32px;               /* up from 24px */
      background: var(--status-bg);
      border-top: 1px solid var(--status-border);
      flex-shrink: 0;
      font-size: 13px;            /* up from 11px */
      font-weight: 500;
      color: var(--text-faint);
      font-variant-numeric: tabular-nums;
    }

    #status-file { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #status-msg { color: #047857; font-weight: 600; transition: opacity 0.3s; }
    #status-msg.hidden { opacity: 0; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 44px;
      right: 20px;
      padding: 12px 22px;         /* up from 8px 16px */
      border-radius: 8px;
      font-size: 14px;            /* up from 12px */
      font-weight: 600;
      z-index: 9999;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18), 0 1px 4px rgba(0,0,0,0.1);
    }
    #toast.hidden  { opacity: 0; transform: translateY(6px); }
    #toast.success { background: var(--toast-success); color: #fff; opacity: 1; transform: translateY(0); }
    #toast.error   { background: var(--toast-error);   color: #fff; opacity: 1; transform: translateY(0); }

    /* ── Button popup (appears just below the clicked action button) ── */
    #action-popup {
      position: fixed;
      z-index: 9999;
      padding: 7px 16px;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 600;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 3px 10px rgba(0,0,0,0.18);
      transition: opacity 0.2s ease, transform 0.2s ease;
      transform: translateX(-50%) translateY(0);
      /* caret color driven by per-instance custom property */
      --popup-bg: #047857;
      background: var(--popup-bg);
      color: #fff;
    }
    #action-popup.hidden {
      opacity: 0;
      transform: translateX(-50%) translateY(4px);
    }
    #action-popup.error { --popup-bg: #B91C1C; }
    /* upward-pointing caret */
    #action-popup::before {
      content: '';
      position: absolute;
      top: -7px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-bottom: 7px solid var(--popup-bg);
    }
  </style>
</head>
<body>
  <div id="app">

    <!-- Navigation toolbar -->
    <div id="nav-toolbar">
      <button id="btn-open" class="toolbar-btn primary">📂 Open PDF</button>
      <div class="sep"></div>
      <button id="btn-prev"  class="toolbar-btn" title="Previous page (←)" disabled>◀</button>
      <span id="page-info">— / —</span>
      <button id="btn-next"  class="toolbar-btn" title="Next page (→)" disabled>▶</button>
      <div class="sep"></div>
      <button id="btn-zoom-out" class="toolbar-btn" title="Zoom out" disabled>−</button>
      <span id="zoom-level">100%</span>
      <button id="btn-zoom-in"  class="toolbar-btn" title="Zoom in" disabled>+</button>
      <button id="btn-zoom-fit" class="toolbar-btn" title="Fit to window" disabled>Fit</button>
    </div>

    <!-- Action toolbar -->
    <div id="action-toolbar">
      <div id="action-buttons-wrap">
        <div id="action-buttons"><!-- populated by renderer.js --></div>
      </div>
      <div id="fixed-buttons">
        <button id="btn-print"    class="action-btn print-btn"    disabled>🖨 Print</button>
        <button id="btn-settings" class="action-btn settings-btn">⚙ Settings</button>
      </div>
    </div>

    <!-- PDF display area -->
    <div id="pdf-container">
      <div id="pdf-empty-state">
        <div class="icon">📄</div>
        <h2>No PDF open</h2>
        <p>Use <strong>File › Open PDF…</strong> or click <strong>Open PDF</strong> above</p>
      </div>
      <canvas id="pdf-canvas"></canvas>
    </div>

    <!-- Status bar -->
    <div id="status-bar">
      <span id="status-file">No file open</span>
      <span id="status-msg" class="hidden"></span>
    </div>

  </div>

  <!-- Toast notification (errors / non-button events) -->
  <div id="toast" class="hidden"></div>
  <!-- Per-button save confirmation popup -->
  <div id="action-popup" class="hidden"></div>

  <script type="module" src="renderer.js"></script>
</body>
</html>
