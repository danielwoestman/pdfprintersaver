<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Settings — Configure Buttons</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9fafb;
      --surface: #fff;
      --border: #e5e7eb;
      --text: #111827;
      --text-muted: #6b7280;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --danger: #dc2626;
      --row-alt: #f3f4f6;
      --input-border: #d1d5db;
      --input-focus: #2563eb;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px;            /* up from 13px */
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    #settings-wrap {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 16px 20px;
      gap: 12px;
    }

    h1 {
      font-size: 20px;            /* up from 16px */
      font-weight: 700;
      color: var(--text);
    }

    p.subtitle {
      font-size: 14px;            /* up from 12px */
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ── Table ── */
    .table-wrap {
      flex: 1;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      position: sticky;
      top: 0;
      background: #f3f4f6;
      padding: 10px 12px;         /* up from 8px 10px */
      text-align: left;
      font-size: 12px;            /* up from 11px */
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }

    tbody tr:nth-child(even) { background: var(--row-alt); }
    tbody tr:hover { background: #eff6ff; }

    td {
      padding: 10px 12px;         /* up from 7px 10px */
      vertical-align: middle;
      border-bottom: 1px solid var(--border);
    }

    td:last-child { border-bottom: none; }
    tr:last-child td { border-bottom: none; }

    .col-num {
      width: 40px;
      text-align: center;
      font-weight: 700;
      color: var(--text-muted);
      font-size: 14px;            /* up from 12px */
    }

    .col-label { width: 180px; }
    .col-folder { }
    .col-browse {
      width: 210px;
      white-space: nowrap;
    }
    .col-browse .btn-group {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
    }

    input[type="text"] {
      width: 100%;
      padding: 7px 10px;          /* up from 4px 8px */
      border: 1px solid var(--input-border);
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;            /* up from 12px */
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus {
      border-color: var(--input-focus);
      box-shadow: 0 0 0 3px rgba(29,78,216,0.15);
    }

    .folder-display {
      font-size: 13px;            /* up from 11px */
      color: var(--text-muted);
      font-family: 'Consolas', 'Courier New', monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 280px;
    }

    .folder-display.set { color: var(--text); font-weight: 500; }

    /* ── Buttons — 44px minimum touch target ── */
    button {
      min-height: 38px;           /* accessibility minimum */
      padding: 8px 16px;          /* up from 5px 12px */
      border-radius: 6px;
      border: 1px solid transparent;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;            /* up from 12px */
      font-weight: 600;
      transition: background 0.15s;
    }

    .btn-browse {
      background: #f3f4f6;
      color: var(--text);
      border-color: var(--border);
    }
    .btn-browse:hover { background: #e5e7eb; }

    .btn-clear {
      background: #fff5f5;
      color: var(--danger);
      border-color: #fecaca;
    }
    .btn-clear:hover:not(:disabled) { background: #fee2e2; border-color: #fca5a5; }
    .btn-clear:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Footer ── */
    .footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding-top: 4px;
    }

    .btn-cancel {
      background: var(--surface);
      color: var(--text);
      border-color: var(--border);
    }
    .btn-cancel:hover { background: var(--row-alt); }

    .btn-save {
      background: var(--primary);
      color: #fff;
      padding: 8px 24px;          /* extra wide — primary action */
    }
    .btn-save:hover { background: var(--primary-hover); }

    #save-status {
      font-size: 14px;            /* up from 12px */
      font-weight: 500;
      color: var(--text-muted);
      align-self: center;
      margin-right: auto;
    }
    #save-status.ok { color: #047857; }
    #save-status.err { color: var(--danger); }

    /* ── Printer section ── */
    .printer-section {
      padding: 18px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .printer-section h2 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .printer-section .subtitle {
      margin-top: 0;
      margin-bottom: 14px;
    }

    .printer-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .printer-row select {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid var(--input-border);
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      background: #fff;
      outline: none;
      cursor: pointer;
      min-height: 38px;
    }

    .printer-row select:focus {
      border-color: var(--input-focus);
      box-shadow: 0 0 0 3px rgba(29,78,216,0.15);
    }
  </style>
</head>
<body>
  <div id="settings-wrap">
    <div>
      <h1>Configure Action Buttons</h1>
      <p class="subtitle">Each button copies the open PDF into its destination folder when clicked.</p>
    </div>

    <div class="table-wrap">
      <table id="settings-table">
        <thead>
          <tr>
            <th class="col-num">#</th>
            <th class="col-label">Button Label</th>
            <th class="col-folder">Destination Folder</th>
            <th class="col-browse"></th>
          </tr>
        </thead>
        <tbody id="settings-body">
          <!-- Populated by settings.js -->
        </tbody>
      </table>
    </div>

    <!-- Default printer -->
    <div class="printer-section">
      <h2>Default Printer</h2>
      <p class="subtitle">When set, the Print button sends directly to this printer. Leave on "Open in viewer" to use your system's PDF viewer instead.</p>
      <div class="printer-row">
        <select id="printer-select">
          <option value="">— Open in PDF viewer (default) —</option>
        </select>
        <button class="btn-browse" id="btn-detect-printers">Detect Printers</button>
      </div>
    </div>

    <div class="footer">
      <span id="save-status"></span>
      <button class="btn-cancel" id="btn-cancel">Cancel</button>
      <button class="btn-save"   id="btn-save">Save Settings</button>
    </div>
  </div>

  <script type="module" src="settings.js"></script>
</body>
</html>
