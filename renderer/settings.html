<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Settings — Configure Buttons</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9fafb;
      --surface: #fff;
      --border: #e5e7eb;
      --text: #111827;
      --text-muted: #6b7280;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --danger: #dc2626;
      --row-alt: #f3f4f6;
      --input-border: #d1d5db;
      --input-focus: #2563eb;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      background: var(--bg);
      color: var(--text);
    }

    #settings-wrap {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 20px;
      gap: 16px;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    p.subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ── Table ── */
    .table-wrap {
      flex: 1;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      position: sticky;
      top: 0;
      background: #f3f4f6;
      padding: 8px 10px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }

    tbody tr:nth-child(even) { background: var(--row-alt); }
    tbody tr:hover { background: #eff6ff; }

    td {
      padding: 7px 10px;
      vertical-align: middle;
      border-bottom: 1px solid var(--border);
    }

    td:last-child { border-bottom: none; }
    tr:last-child td { border-bottom: none; }

    .col-num {
      width: 36px;
      text-align: center;
      font-weight: 600;
      color: var(--text-muted);
      font-size: 12px;
    }

    .col-label { width: 160px; }
    .col-folder { }
    .col-browse { width: 80px; text-align: right; }

    input[type="text"] {
      width: 100%;
      padding: 4px 8px;
      border: 1px solid var(--input-border);
      border-radius: 4px;
      font-family: inherit;
      font-size: 12px;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus {
      border-color: var(--input-focus);
      box-shadow: 0 0 0 2px rgba(37,99,235,0.15);
    }

    .folder-display {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'Consolas', 'Courier New', monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 260px;
    }

    .folder-display.set { color: var(--text); }

    /* ── Buttons ── */
    button {
      padding: 5px 12px;
      border-radius: 4px;
      border: 1px solid transparent;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      transition: background 0.15s;
    }

    .btn-browse {
      background: #f3f4f6;
      color: var(--text);
      border-color: var(--border);
    }
    .btn-browse:hover { background: #e5e7eb; }

    .btn-clear {
      background: none;
      border: none;
      color: var(--danger);
      padding: 4px 6px;
      font-size: 11px;
      cursor: pointer;
    }
    .btn-clear:hover { text-decoration: underline; }

    /* ── Footer ── */
    .footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding-top: 4px;
    }

    .btn-cancel {
      background: var(--surface);
      color: var(--text);
      border-color: var(--border);
    }
    .btn-cancel:hover { background: var(--row-alt); }

    .btn-save {
      background: var(--primary);
      color: #fff;
    }
    .btn-save:hover { background: var(--primary-hover); }

    #save-status {
      font-size: 12px;
      color: var(--text-muted);
      align-self: center;
      margin-right: auto;
    }
    #save-status.ok { color: #059669; }
    #save-status.err { color: var(--danger); }
  </style>
</head>
<body>
  <div id="settings-wrap">
    <div>
      <h1>Configure Action Buttons</h1>
      <p class="subtitle">Each button copies the open PDF into its destination folder when clicked.</p>
    </div>

    <div class="table-wrap">
      <table id="settings-table">
        <thead>
          <tr>
            <th class="col-num">#</th>
            <th class="col-label">Button Label</th>
            <th class="col-folder">Destination Folder</th>
            <th class="col-browse"></th>
          </tr>
        </thead>
        <tbody id="settings-body">
          <!-- Populated by settings.js -->
        </tbody>
      </table>
    </div>

    <div class="footer">
      <span id="save-status"></span>
      <button class="btn-cancel" id="btn-cancel">Cancel</button>
      <button class="btn-save"   id="btn-save">Save Settings</button>
    </div>
  </div>

  <script type="module" src="settings.js"></script>
</body>
</html>
